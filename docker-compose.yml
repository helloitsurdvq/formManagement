services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: form-fe
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
      
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: form-be
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: rootpwd
      DB_NAME: formManagement
      DB_PORT: 3306
    ports:
      - "3000:3000"

  mysql:
    image: mysql
    container_name: form-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_DATABASE: formManagement
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql-data: